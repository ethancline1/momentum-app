<!doctype html>
<!-- Momentum Martial Arts Members App -->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <title>Momentum Martial Arts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── Base surfaces ── */
  --bg:#080808;
  --bg2:#0f0f0f;
  --card:#141414;
  --elev:#1c1c1c;
  --border:#252525;
  --bsub:#181818;

  /* ── Blue accent ── */
  --accent:#3B82F6;
  --accent-dark:#2563EB;
  --adim:rgba(59,130,246,.14);
  --aglow:rgba(59,130,246,.35);
  --ahover:rgba(59,130,246,.22);

  /* ── Comp team gold (special only) ── */
  --gold:#D4A017;
  --gdim:rgba(212,160,23,.16);
  --gglow:rgba(212,160,23,.38);

  /* ── Text ── */
  --text:#F1F5F9;
  --t2:#94A3B8;
  --t3:#475569;
  --t4:#2D3748;

  /* ── Class type palette (blue-grey family) ── */
  --mma:#3B82F6;    --mmabg:rgba(59,130,246,.13);
  --bjj:#60A5FA;    --bjjbg:rgba(96,165,250,.13);
  --mt:#94A3B8;     --mtbg:rgba(148,163,184,.12);
  --box:#818CF8;    --boxbg:rgba(129,140,248,.13);
  --fit:#34D399;    --fitbg:rgba(52,211,153,.12);
  --kid:#7DD3FC;    --kidbg:rgba(125,211,252,.12);
  --om:#64748B;     --ombg:rgba(100,116,139,.12);

  --fd:'Barlow Condensed',sans-serif;
  --fb:'Barlow',sans-serif;
  --r1:8px;--r2:12px;--r3:16px;
  --nh:72px;--hh:64px;
}

html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);-webkit-font-smoothing:antialiased;overscroll-behavior:none}
button{font-family:var(--fb);cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit}
input,textarea,select{font-family:var(--fb)}
::-webkit-scrollbar{width:0;height:0}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100dvh;height:100vh;max-width:480px;margin:0 auto}
.hdr{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--hh);background:rgba(8,8,8,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:50}
.hdr-inner{height:64px;padding:0 16px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-m{width:38px;height:38px;border-radius:50%;object-fit:contain;background:#fff}
.logo-txt{display:flex;flex-direction:column;gap:1px}
.logo-top{font-family:var(--fd);font-weight:900;font-size:18px;letter-spacing:1.5px;line-height:1}
.logo-bot{font-family:var(--fd);font-weight:600;font-size:9.5px;letter-spacing:1px;color:var(--t3);line-height:1;text-transform:uppercase}
.pg-title{font-family:var(--fd);font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2)}
.main{flex:1;overflow-y:auto;padding-top:var(--hh);padding-bottom:var(--nh);-webkit-overflow-scrolling:touch}

/* ── AUTH SCREENS ── */
.auth-wrap{min-height:100dvh;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 24px 32px;background:var(--bg);max-width:480px;margin:0 auto;overflow-y:auto}
.auth-logo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:36px}
.auth-m{width:90px;height:90px;border-radius:50%;object-fit:contain;background:#fff}
.auth-title{font-family:var(--fd);font-weight:900;font-size:24px;letter-spacing:2px}
.auth-sub{font-size:12px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

.auth-form{width:100%;display:flex;flex-direction:column;gap:10px}
.auth-input{width:100%;padding:13px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:15px;outline:none;transition:border-color .2s}
.auth-input:focus{border-color:var(--accent)}
.auth-input::placeholder{color:var(--t3)}
.auth-select{width:100%;padding:13px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:15px;outline:none;appearance:none;transition:border-color .2s}
.auth-select:focus{border-color:var(--accent)}
.auth-select option{background:var(--card);color:var(--text)}
.auth-btn{width:100%;padding:15px;background:var(--accent);color:#fff;font-family:var(--fd);font-weight:800;font-size:17px;letter-spacing:1px;text-transform:uppercase;border-radius:var(--r2);margin-top:4px;transition:opacity .15s}
.auth-btn:active{opacity:.8}
.auth-err{color:#F87171;font-size:13px;text-align:center;padding:2px 0}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--t2)}
.auth-switch-btn{color:var(--accent);font-weight:700;margin-left:4px;-webkit-tap-highlight-color:transparent}

/* Discipline pills on register */
.disc-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:6px;display:block}
.disc-pills{display:flex;flex-wrap:wrap;gap:6px}
.disc-pill{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid var(--border);color:var(--t2);background:var(--card);-webkit-tap-highlight-color:transparent;transition:all .15s}
.disc-pill.on{border-color:var(--accent);color:var(--accent);background:var(--adim)}

/* Demo accounts */
.demo-section{width:100%;margin-top:20px}
.demo-label{font-size:11px;color:var(--t3);text-align:center;letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
.demo-btns{display:flex;flex-direction:column;gap:6px}
.demo-btn{width:100%;padding:11px 14px;background:var(--card);border:1px solid var(--bsub);border-radius:var(--r2);text-align:left;display:flex;align-items:center;gap:12px;-webkit-tap-highlight-color:transparent;transition:background .15s}
.demo-btn:active{background:var(--elev)}
.demo-av{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:900;font-size:12px;color:#fff;flex-shrink:0}
.demo-info{flex:1}
.demo-name{font-size:13px;font-weight:600}
.demo-role{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--nh);background:rgba(8,8,8,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:100}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 2px;color:var(--t3);position:relative;-webkit-tap-highlight-color:transparent;transition:color .2s}
.ntab.on{color:var(--accent)}
.ntab svg{width:20px;height:20px}
.nlbl{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.nind{position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:var(--accent);border-radius:0 0 4px 4px}

/* ── SCHEDULE ── */
.dsel-wrap{position:sticky;top:0;background:rgba(8,8,8,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--bsub);z-index:10}
.dsel{display:flex;overflow-x:auto;gap:4px;padding:10px 12px;scroll-snap-type:x mandatory}
.dsel::-webkit-scrollbar{display:none}
.dbtn{flex-shrink:0;scroll-snap-align:center;display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 18px;border-radius:var(--r2);color:var(--t3);font-family:var(--fd);font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;transition:color .2s,background .2s;-webkit-tap-highlight-color:transparent}
.dbtn.on{color:var(--accent);background:var(--adim)}
.tdot{width:5px;height:5px;border-radius:50%;background:var(--accent)}
.dhead{display:flex;align-items:baseline;justify-content:space-between;padding:18px 16px 10px}
.dname{font-family:var(--fd);font-weight:900;font-size:28px;letter-spacing:.5px;display:flex;align-items:center;gap:10px}
.tbadge{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);background:var(--adim);border:1px solid var(--aglow);padding:3px 8px;border-radius:20px;font-family:var(--fb)}
.ccount{font-size:13px;color:var(--t3)}
.clist{display:flex;flex-direction:column;padding:0 12px}

/* Regular class card */
.ccard{background:var(--card);border-radius:var(--r2);overflow:hidden;margin-bottom:8px;border:1px solid var(--bsub);transition:opacity .2s}
.ccard.past{opacity:.35}
.ccard-top{display:flex;align-items:stretch}
.ctime{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 12px 14px 14px;min-width:68px;gap:1px;flex-shrink:0}
.tmain{font-family:var(--fd);font-weight:800;font-size:20px;color:var(--text);line-height:1}
.tper{font-family:var(--fd);font-weight:600;font-size:11px;color:var(--t3);letter-spacing:.5px;text-transform:uppercase}
.tdur{margin-top:4px;font-size:10px;color:var(--t3);font-weight:500}
.cbar{width:3px;flex-shrink:0;border-radius:2px;margin:10px 0}
.cinfo{display:flex;flex-direction:column;justify-content:center;padding:13px 14px 13px 12px;flex:1;gap:3px;min-width:0}
.cname{font-family:var(--fd);font-weight:900;font-size:19px;letter-spacing:.3px;line-height:1.1}
.caud{font-size:12px;color:var(--t2);font-weight:500;font-style:italic}
.ctbadge{display:inline-flex;align-self:flex-start;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 8px;border-radius:20px;margin-top:3px}

/* Attendance row */
.att-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px 10px;border-top:1px solid var(--bsub);gap:8px}
.att-go{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.4px;border:1px solid var(--border);color:var(--t3);transition:all .2s;-webkit-tap-highlight-color:transparent}
.att-go.on{color:var(--accent);background:var(--adim);border-color:var(--aglow)}
.att-go svg{width:13px;height:13px}
.att-who{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:20px;font-size:12px;font-weight:600;color:var(--t2);-webkit-tap-highlight-color:transparent}
.att-who svg{width:12px;height:12px;transition:transform .2s}
.att-who svg.open{transform:rotate(180deg)}
.att-members{padding:0 14px 12px;display:flex;flex-wrap:wrap;gap:6px}
.att-pill{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 6px;background:var(--elev);border-radius:20px;font-size:12px;font-weight:500;color:var(--t2)}
.att-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:800;font-size:10px;color:#fff;flex-shrink:0}
.att-first{font-size:12px;color:var(--t3);font-style:italic;padding:4px 14px 12px}

/* Comp team card */
.comp-card{background:var(--card);border-radius:var(--r2);overflow:hidden;margin-bottom:8px;border:1px solid var(--gold);box-shadow:0 0 20px rgba(212,160,23,.08)}
.comp-card.past{opacity:.35}
.comp-topbar{height:3px;background:linear-gradient(90deg,var(--gold),#F5D060,var(--gold))}
.comp-top{display:flex;align-items:stretch}
.comp-cinfo{display:flex;flex-direction:column;justify-content:center;padding:12px 14px 12px 12px;flex:1;gap:4px}
.comp-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--gold);background:var(--gdim);border:1px solid var(--gglow);padding:3px 9px;border-radius:20px;align-self:flex-start;margin-bottom:1px}
.comp-cname{font-family:var(--fd);font-weight:900;font-size:22px;letter-spacing:.3px;line-height:1.1}
.comp-tag{font-size:12.5px;color:var(--gold);font-weight:600;letter-spacing:.2px}
.comp-aud{font-size:12px;color:var(--t2);font-style:italic}
.cbar-gold{width:3px;flex-shrink:0;border-radius:2px;margin:10px 0;background:var(--gold)}

.no-cls{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:8px}
.no-cls .ico{font-size:40px}
.no-cls p{color:var(--t2);font-size:16px;font-weight:500}
.no-cls .sub{color:var(--t3);font-size:13px}
.sched-disc{display:flex;align-items:center;gap:6px;margin:8px 16px 0;padding:10px 12px;background:var(--card);border:1px solid var(--bsub);border-radius:var(--r1);font-size:12px;color:var(--t3);line-height:1.4}
.disc-link{color:var(--accent);text-decoration:none}

/* ── FEED / POSTS ── */
.feed-wrap{padding:0 0 20px}
.feed-composer-bar{display:flex;align-items:center;gap:10px;margin:12px 12px 0;padding:12px 14px;background:var(--card);border:1px solid var(--bsub);border-radius:var(--r2);cursor:pointer;-webkit-tap-highlight-color:transparent}
.feed-composer-bar:active{background:var(--elev)}
.feed-composer-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.feed-composer-ph{flex:1;font-size:14px;color:var(--t3);text-align:left}
.post-card{background:var(--card);border:1px solid var(--bsub);border-radius:var(--r2);margin:8px 12px 0;overflow:hidden;position:relative}
.post-pin-bar{height:2px;background:var(--accent)}
.post-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px 10px}
.post-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
.post-info{flex:1;min-width:0}
.post-name{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.post-staff-badge{font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--accent);background:var(--adim);border:1px solid rgba(59,130,246,.3);padding:2px 6px;border-radius:20px}
.post-meta{font-size:11px;color:var(--t3);margin-top:1px}
.post-menu-btn{background:none;border:none;color:var(--t3);font-size:22px;padding:4px 8px;line-height:1;cursor:pointer;flex-shrink:0;margin-right:-6px}
.post-menu-dd{position:absolute;right:14px;top:52px;background:var(--elev);border:1px solid var(--border);border-radius:var(--r1);overflow:hidden;z-index:20;min-width:130px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.post-menu-dd button{display:block;width:100%;padding:12px 16px;text-align:left;font-size:14px;font-weight:600;color:var(--text);background:none;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
.post-menu-dd button:active{background:var(--card)}
.del-btn{color:#EF4444!important}
.post-type-tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 9px;border-radius:20px;margin:0 14px 8px}
.post-title{font-family:var(--fd);font-weight:800;font-size:17px;letter-spacing:.2px;color:var(--text);padding:0 14px 6px;line-height:1.2}
.post-photo{width:100%;max-height:360px;object-fit:cover;display:block}
.post-body{padding:10px 14px 14px;font-size:14.5px;color:var(--t2);line-height:1.55;white-space:pre-wrap;margin:0}
.post-body.no-top{padding-top:0}
.post-photo-prev{width:100%;max-height:220px;object-fit:cover;border-radius:8px;margin-bottom:10px;display:block}
.composer-actions{display:flex;align-items:center;gap:8px;margin-top:10px}
.composer-photo-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--accent);padding:8px 12px;background:var(--adim);border:1px solid rgba(59,130,246,.25);border-radius:var(--r1);cursor:pointer;-webkit-tap-highlight-color:transparent}
.composer-remove-btn{font-size:12px;font-weight:600;color:var(--t3);padding:8px 10px;background:var(--card);border:1px solid var(--bsub);border-radius:var(--r1);cursor:pointer}

/* ── PROGRAMS ── */
.prog-wrap{padding:16px 0}
.prog-back{display:flex;align-items:center;gap:6px;padding:8px 16px 16px;color:var(--accent);font-size:14px;font-weight:600;-webkit-tap-highlight-color:transparent}
.prog-intro{padding:4px 16px 16px}
.prog-ititle{font-family:var(--fd);font-weight:900;font-size:28px;letter-spacing:.5px}
.prog-isub{font-size:13px;color:var(--t3);margin-top:4px}
.prog-grid{display:flex;flex-direction:column;gap:8px;padding:0 12px}
.prog-card{display:flex;flex-direction:column;align-items:flex-start;background:var(--card);border:1px solid var(--bsub);border-radius:var(--r3);padding:0 16px 16px;position:relative;overflow:hidden;text-align:left;gap:6px;-webkit-tap-highlight-color:transparent;transition:background .15s;cursor:pointer}
.prog-card:active{background:var(--elev)}
.prog-tbar{height:3px;width:40px;border-radius:0 0 3px 3px;margin-bottom:6px}
.prog-ico{font-size:28px;line-height:1}
.prog-badge{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 8px;border-radius:20px}
.prog-nm{font-family:var(--fd);font-weight:900;font-size:20px;letter-spacing:.3px;line-height:1.1}
.prog-tline{font-size:13px;color:var(--t2)}
.prog-arr{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--t3)}
.prog-dh{display:flex;flex-direction:column;align-items:flex-start;gap:8px;padding:20px 16px 24px;border-bottom:1px solid var(--bsub)}
.prog-dico{font-size:40px;line-height:1}
.prog-dnm{font-family:var(--fd);font-weight:900;font-size:32px;letter-spacing:.5px;line-height:1.05}
.prog-dtl{font-size:14px;color:var(--t2);font-style:italic}
.prog-dbody{padding:20px 16px;display:flex;flex-direction:column;gap:24px}
.prog-ddesc{font-size:15px;color:var(--t2);line-height:1.6}
.prog-stitle{font-family:var(--fd);font-weight:700;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:12px}
.prog-hls{display:flex;flex-direction:column;gap:10px}
.prog-hl{display:flex;align-items:center;gap:10px;font-size:14.5px;font-weight:500}
.prog-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.prog-lvls{display:flex;flex-wrap:wrap;gap:8px}
.prog-lvl{font-size:12px;font-weight:600;color:var(--t2);background:var(--elev);border:1px solid var(--border);padding:5px 12px;border-radius:20px}

/* ── PRIVATE LESSONS ── */
.priv-wrap{padding:0 0 16px}
.priv-inst-row{display:flex;gap:8px;overflow-x:auto;padding:16px 12px 12px;scroll-snap-type:x mandatory}
.priv-inst-row::-webkit-scrollbar{display:none}
.priv-ibtn{flex-shrink:0;scroll-snap-align:center;display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--card);border:1px solid var(--bsub);border-radius:var(--r2);-webkit-tap-highlight-color:transparent;transition:border-color .2s,background .2s}
.priv-ibtn.on{border-color:var(--accent);background:var(--adim)}
.priv-iav{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:900;font-size:12px;color:#fff;flex-shrink:0}
.priv-iname{font-size:13px;font-weight:600;white-space:nowrap}
.priv-ispec{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.cal-wrap{padding:0 12px 8px}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 0 12px}
.cal-mnth{font-family:var(--fd);font-weight:800;font-size:20px;letter-spacing:.5px}
.cal-nav{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--t2);-webkit-tap-highlight-color:transparent}
.cal-nav:active{background:var(--elev)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}

function registerUser(data){
  const users=getUsers()
  const colorIdx=users.length%AVATAR_COLORS.length
  const newUser={
    id:'u'+Date.now(),
    name:data.name,
    email:data.email,
    password:data.password,
    role:'member',
    initials:data.name.trim().split(/\s+/).map(w=>w[0].toUpperCase()).slice(0,2).join(''),

    discs:data.discs||[],
  }
  sv('mma_users',[...users,newUser])
  return newUser
}

function getTodayIdx(){return [6,0,1,2,3,4,5][new Date().getDay()]}
function isPastDate(d){const t=new Date();t.setHours(0,0,0,0);return d<t}
function isToday(d){const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate()}
function fmtDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fmtDateDisplay(d){return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
function timeAgo(ds){const diff=Math.floor((Date.now()-new Date(ds).getTime())/1000);if(diff<60)return 'Just now';if(diff<3600)return `${Math.floor(diff/60)}m ago`;if(diff<86400)return `${Math.floor(diff/3600)}h ago`;const days=Math.floor(diff/86400);if(days===1)return 'Yesterday';if(days<7)return `${days}d ago`;if(days<30)return `${Math.floor(days/7)}w ago`;return new Date(ds).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function isClassPast(t){const[tp,per]=t.split(' ');let[h,m]=tp.split(':').map(Number);if(per==='PM'&&h!==12)h+=12;if(per==='AM'&&h===12)h=0;const n=new Date();return h*60+m<n.getHours()*60+n.getMinutes()}
function ruid(){return Math.random().toString(36).slice(2)}
function buildCalDays(ms){const y=ms.getFullYear(),mo=ms.getMonth();const fd=ms.getDay();const off=fd===0?6:fd-1;const dim=new Date(y,mo+1,0).getDate();const days=[];for(let i=0;i<off;i++)days.push(null);for(let d=1;d<=dim;d++)days.push(new Date(y,mo,d));return days}

function SchedulePage({user}){
  const[selDay,setSelDay]=useState(getTodayIdx())
  const today=getTodayIdx()
  const btnRefs=useRef([])
  const[attState,setAttState]=useState({})
  const[expanded,setExpanded]=useState(null)
  const schedule=getSchedule()
  const allUsers=getUsers()

  useEffect(()=>{
    const s={}
    Object.entries(schedule).forEach(([day,classes])=>{
      classes.forEach(cls=>{s[`${day}_${cls.name}_${cls.time}`]=getAtt(day,cls.name,cls.time)})
    })
    setAttState(s)
  },[])

  useEffect(()=>{btnRefs.current[selDay]?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},[selDay])

  const dayName=DAYS[selDay]
  const classes=schedule[dayName]||[]

  function toggle(cls){
    const newList=toggleAtt(dayName,cls.name,cls.time,user.id)
    setAttState(p=>({...p,[`${dayName}_${cls.name}_${cls.time}`]:newList}))
  }

  function renderAtt(cls){
    const k=`${dayName}_${cls.name}_${cls.time}`
    const list=attState[k]||[]
    const iGoing=list.includes(user.id)
    const isExp=expanded===k
    const members=list.map(id=>getUserById(id)).filter(Boolean)
    return(
      <div>
        <div className="att-row">
          <button className={`att-go${iGoing?' on':''}`} onClick={()=>toggle(cls)}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              {iGoing?<polyline points="20 6 9 17 4 12"/>:<circle cx="12" cy="12" r="10"/>}
            </svg>
            {iGoing?'Going':'Going?'}
          </button>
          <button className="att-who" onClick={()=>setExpanded(isExp?null:k)}>
            {list.length>0?`${list.length} going`:'Be first'}
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={isExp?'open':''}>
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
        </div>
        {isExp&&(
          list.length===0
            ?<div className="att-first">No one signed up yet — be the first!</div>
            :<div className="att-members">
              {members.map(m=>(
                <div key={m.id} className="att-pill">
                  <div className="att-av" style={{background:m.accent}}>{m.initials}</div>
                  {m.name.split(' ')[0]}
                </div>
              ))}
            </div>
        )}
      </div>
    )
  }

  return(
    <div>
      <div className="dsel-wrap">
        <div className="dsel">
          {DAYS.map((d,i)=>(
            <button key={d} ref={el=>btnRefs.current[i]=el} className={`dbtn${selDay===i?' on':''}`} onClick={()=>setSelDay(i)}>

              {i===today&&<span className="tdot"/>}
            </button>
          ))}
        </div>
      </div>
      <div className="dhead">
        <h2 className="dname">{dayName}{selDay===today&&<span className="tbadge">Today</span>}</h2>
        <span className="ccount">{classes.length} class{classes.length!==1?'es':''}</span>
      </div>
      <div className="clist">
        {classes.length===0?(
          <div className="no-cls"><span className="ico">🥋</span><p>No classes scheduled</p><p className="sub">Rest up!</p></div>
        ):classes.map((cls,i)=>{
          const past=selDay===today&&isClassPast(cls.time)
          const[tp,per]=cls.time.split(' ')
          if(cls.compTeam)return(
            <div key={i} className={`ccard${past?' past':''}`} style={{border:'1px solid var(--gold)'}}>
              <div className="ccard-top">
                <div className="ctime"><span className="tmain">{tp}</span><span className="tper">{per}</span><span className="tdur">{cls.duration}m</span></div>
                <div className="cbar-gold"/>
                <div className="cinfo">
                  <span className="cname">{cls.name}</span>
                  <span className="caud">{cls.audience}</span>
                  <span className="ctbadge" style={{color:'var(--gold)',background:'var(--gdim)'}}>🏆 Comp Team</span>
                </div>
              </div>
              {renderAtt(cls)}
            </div>
          )

function FeedPage({user}){
  const[posts,setPosts]=useState(getPosts)
  const[menuOpen,setMenuOpen]=useState(null)
  const[composerOpen,setComposerOpen]=useState(false)
  const[editingPost,setEditingPost]=useState(null)
  const BLANK_DRAFT={body:'',photo:null,title:'',pinned:false,postType:'post'}
  const[draft,setDraft]=useState(BLANK_DRAFT)
  const fileRef=React.useRef(null)

  const pinned=posts.filter(p=>p.pinned).sort((a,b)=>b.date.localeCompare(a.date))
  const feed=posts.filter(p=>!p.pinned).sort((a,b)=>b.date.localeCompare(a.date))

  function openComposer(){setEditingPost(null);setDraft(BLANK_DRAFT);setComposerOpen(true)}
  function openEdit(post){setEditingPost(post);setDraft({body:post.body,photo:post.photo,title:post.title||'',pinned:post.pinned,postType:post.postType});setComposerOpen(true);setMenuOpen(null)}

  function handlePhoto(e){
    const f=e.target.files[0];if(!f)return
    const r=new FileReader();r.onload=ev=>setDraft(d=>({...d,photo:ev.target.result}));r.readAsDataURL(f)
    e.target.value=''
  }

  function submit(){
    if(!draft.body.trim()&&!draft.photo)return
    if(editingPost){
      const u=posts.map(p=>p.id===editingPost.id?{...p,body:draft.body,photo:draft.photo,title:draft.title,pinned:user.role==='admin'?draft.pinned:p.pinned,postType:draft.postType,edited:true}:p)
      savePosts(u);setPosts(u)
    } else {
      const np={id:'p'+Date.now(),authorId:user.id,authorName:user.name,authorInitials:user.initials,authorAccent:user.accent,isAdmin:user.role==='admin',postType:draft.postType||'post',title:user.role==='admin'?draft.title:'',body:draft.body,photo:draft.photo,date:new Date().toISOString(),pinned:user.role==='admin'&&draft.pinned,edited:false}
      const u=[np,...posts];savePosts(u);setPosts(u)
    }
    setComposerOpen(false);setEditingPost(null);setDraft(BLANK_DRAFT)
  }

  function deletePost(id){
    if(!window.confirm('Delete this post?'))return
    const u=posts.filter(p=>p.id!==id);savePosts(u);setPosts(u);setMenuOpen(null)
  }

  function PostCard({post}){
    const isOwn=post.authorId===user.id||user.role==='admin'
    const isMenuOpen=menuOpen===post.id
    const pt=POST_TYPES[post.postType]||POST_TYPES.post
    const hasTitle=post.isAdmin&&post.title
    return(
      <div className="post-card" onClick={()=>isMenuOpen&&setMenuOpen(null)}>
        {post.pinned&&<div className="post-pin-bar"/>}
        <div className="post-hdr">
          <div className="post-avatar" style={{background:post.authorAccent}}>{post.authorInitials}</div>
          <div className="post-info">
            <div className="post-name">{post.authorName}{post.isAdmin&&<span className="post-staff-badge">STAFF</span>}</div>
            <div className="post-meta">{timeAgo(post.date)}{post.edited?' · edited':''}{post.pinned?' · 📌':''}</div>
          </div>
          {isOwn&&<button className="post-menu-btn" onClick={e=>{e.stopPropagation();setMenuOpen(isMenuOpen?null:post.id)}}>⋯</button>}
        </div>
        {isMenuOpen&&(
          <div className="post-menu-dd">
            <button onClick={e=>{e.stopPropagation();openEdit(post)}}>✏️ Edit</button>
            <button className="del-btn" onClick={e=>{e.stopPropagation();deletePost(post.id)}}>🗑 Delete</button>
          </div>
        )}
        {post.postType!=='post'&&<span className="post-type-tag" style={{color:pt.ac,background:`${pt.ac}18`}}>{pt.icon} {pt.label}</span>}
        {hasTitle&&<div className="post-title">{post.title}</div>}
        {post.photo&&<img className="post-photo" src={post.photo} alt=""/>}
        {post.body&&<p className={`post-body${(hasTitle||post.photo)?' no-top':''}`}>{post.body}</p>}
      </div>
    )
  }

  return(
    <div className="feed-wrap">
      <div className="feed-composer-bar" onClick={openComposer}>
        <div className="feed-composer-av" style={{background:user.accent}}>{user.initials}</div>
        <span className="feed-composer-ph">Share something with the gym...</span>
      </div>

      {pinned.map(p=><PostCard key={p.id} post={p}/>)}
      {feed.map(p=><PostCard key={p.id} post={p}/>)}

      {composerOpen&&(
        <div className="form-overlay" onClick={e=>e.target===e.currentTarget&&setComposerOpen(false)}>
          <div className="form-sheet">
            <div className="form-drag"/>
            <div className="form-title">{editingPost?'Edit Post':'New Post'}</div>

            {user.role==='admin'&&(
              <div className="form-group">
                <label className="form-label">Post Type</label>
                <select className="form-select" value={draft.postType} onChange={e=>setDraft(d=>({...d,postType:e.target.value}))}>
                  {Object.entries(POST_TYPES).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}
                </select>
              </div>
            )}
            {user.role==='admin'&&draft.postType!=='post'&&(
              <div className="form-group">
                <label className="form-label">Title (optional)</label>
                <input className="form-input" value={draft.title} onChange={e=>setDraft(d=>({...d,title:e.target.value}))} placeholder="Post title..."/>
              </div>
            )}
            <div className="form-group">
              <label className="form-label">Message</label>
              <textarea className="form-textarea" value={draft.body} onChange={e=>setDraft(d=>({...d,body:e.target.value}))} placeholder="What's on your mind?" style={{minHeight:100}}/>
            </div>
            {draft.photo&&<img className="post-photo-prev" src={draft.photo} alt="preview"/>}
            <div className="composer-actions">
              <button className="composer-photo-btn" onClick={()=>fileRef.current.click()}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                {draft.photo?'Change Photo':'Add Photo'}
              </button>
              {draft.photo&&<button className="composer-remove-btn" onClick={()=>setDraft(d=>({...d,photo:null}))}>Remove</button>}
              {user.role==='admin'&&(
                <button className={`form-toggle${draft.pinned?' on':' off'}`} style={{marginLeft:'auto'}} onClick={()=>setDraft(d=>({...d,pinned:!d.pinned}))} title="Pin post"/>
              )}
            </div>
            <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handlePhoto}/>
            <div className="form-btns" style={{marginTop:16}}>
              <button className="form-cancel" onClick={()=>setComposerOpen(false)}>Cancel</button>
              <button className="form-save" onClick={submit}>{editingPost?'Save':'Post'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  )
}

function PrivatePage({user}){
  const[instId,setInstId]=useState(PRIV_INSTRUCTORS[0].id)
  const[calMonth,setCalMonth]=useState(()=>{const n=new Date();return new Date(n.getFullYear(),n.getMonth(),1)})
  const[selDate,setSelDate]=useState(null)
  const[bookings,setBookings]=useState(getBookings)
  const inst=PRIV_INSTRUCTORS.find(i=>i.id===instId)
  const calDays=buildCalDays(calMonth)
  const myBookings=bookings.filter(b=>b.userId===user.id)
  const today=new Date();today.setHours(0,0,0,0)

  function hasMyBookingOn(date){const ds=fmtDate(date);return myBookings.some(b=>b.instructorId===instId&&b.date===ds)}
  function getSlotStatus(date,time){
    const ds=fmtDate(date)
    const mine=bookings.find(b=>b.instructorId===instId&&b.date===ds&&b.time===time&&b.userId===user.id)
    if(mine)return{status:'mine',booking:mine}
    const taken=bookings.find(b=>b.instructorId===instId&&b.date===ds&&b.time===time)
    if(taken)return{status:'taken'}
    return{status:'available'}
  }
  function book(date,time){
    const nb={id:'bk'+ruid(),userId:user.id,instructorId:instId,instructorName:inst.name,date:fmtDate(date),time,status:'confirmed'}
    const u=[...bookings,nb];saveBookings(u);setBookings(u)
  }
  function cancel(bkId){const u=bookings.filter(b=>b.id!==bkId);saveBookings(u);setBookings(u)}

  return(
    <div className="priv-wrap">
      <div className="priv-inst-row">
        {PRIV_INSTRUCTORS.map(i=>(
          <button key={i.id} className={`priv-ibtn${instId===i.id?' on':''}`} onClick={()=>{setInstId(i.id);setSelDate(null)}}>
            <div className="priv-iav" style={{background:i.accent}}>{i.initials}</div>
            <div><div className="priv-iname">{i.name.split(' ')[0]}</div><div className="priv-ispec">{i.discs[0]}</div></div>
          </button>
        ))}
      </div>

      {myBookings.filter(b=>b.instructorId===instId&&b.date>=fmtDate(today)).length>0&&(
        <div className="my-bk-sec">
          <div className="sec-ttl">Your Upcoming Lessons</div>
          {myBookings.filter(b=>b.instructorId===instId&&b.date>=fmtDate(today)).sort((a,b)=>a.date.localeCompare(b.date)).map(bk=>(
            <div key={bk.id} className="bk-card">
              <div className="bk-dot" style={{background:inst.accent}}/>
              <div className="bk-info"><div className="bk-who">{bk.instructorName}</div><div className="bk-when">{fmtDateDisplay(new Date(bk.date+'T12:00:00'))} · {bk.time}</div></div>
              <button className="bk-cancel" onClick={()=>cancel(bk.id)}>Cancel</button>
            </div>
          ))}
        </div>
      )}

      <div className="cal-wrap">
        <div className="cal-hdr">
          <button className="cal-nav" onClick={()=>setCalMonth(d=>new Date(d.getFullYear(),d.getMonth()-1,1))}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
          <span className="cal-mnth">{calMonth.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</span>
          <button className="cal-nav" onClick={()=>setCalMonth(d=>new Date(d.getFullYear(),d.getMonth()+1,1))}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
        <div className="cal-grid">
          {['Mo','Tu','We','Th','Fr','Sa','Su'].map(d=><div key={d} className="cal-dow">{d}</div>)}
          {calDays.map((d,i)=>{
            if(!d)return<div key={i}/>
            const disabled=isPastDate(d)||d.getDay()===0
            const sel=selDate&&fmtDate(selDate)===fmtDate(d)
            const hasBk=hasMyBookingOn(d)
            let cls='cal-day'+(d.getDay()!==0?' cur':'')+(isToday(d)?' today':'')+(sel?' sel':'')+(disabled?' dis':'')+(hasBk?' hasbk':'')
            return <button key={i} className={cls} onClick={()=>!disabled&&setSelDate(d)}>{d.getDate()}</button>
          })}
        </div>
      </div>

      {selDate&&(
        <div className="slots-wrap">
          <div className="slots-date-hdr">{fmtDateDisplay(selDate)}</div>
          {inst.slots.map(time=>{
            const{status,booking:bk}=getSlotStatus(selDate,time)
            return(
              <div key={time} className="slot-row">
                <span className="slot-time">{time}</span>
                <span className={`slot-status${status==='mine'?' mine':status==='taken'?' taken':''}`}>
                  {status==='mine'?'Your lesson':status==='taken'?'Unavailable':'Available'}
                </span>
                {status==='available'&&<button className="slot-book-btn" onClick={()=>book(selDate,time)}>Book</button>}
                {status==='mine'&&<button className="slot-cancel-btn" onClick={()=>cancel(bk.id)}>Cancel</button>}
              </div>
            )
          })}
        </div>
      )}
    </div>
  )
}

      </div>

      {editCls&&(
        <div className="form-overlay" onClick={e=>e.target===e.currentTarget&&setEditCls(null)}>
          <div className="form-sheet">
            <div className="form-drag"/>
            <div className="form-title">{editCls.isNew?'Add Class':'Edit Class'}</div>
            <div className="form-group"><label className="form-label">Class Name</label><input className="form-input" value={editCls.item.name} onChange={e=>setClsF('name',e.target.value)} placeholder="e.g. BJJ Foundations"/></div>
            <div className="form-group"><label className="form-label">Time</label><input className="form-input" value={editCls.item.time} onChange={e=>setClsF('time',e.target.value)} placeholder="e.g. 7:30 PM"/></div>
            <div className="form-group"><label className="form-label">Duration (minutes)</label><input className="form-input" type="number" value={editCls.item.duration} onChange={e=>setClsF('duration',Number(e.target.value))}/></div>
            <div className="form-group"><label className="form-label">Type</label>
              <select className="form-select" value={editCls.item.type} onChange={e=>setClsF('type',e.target.value)}>
                {Object.entries(CT).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
              </select>
            </div>
            <div className="form-group"><label className="form-label">Who It's For</label><input className="form-input" value={editCls.item.audience} onChange={e=>setClsF('audience',e.target.value)}/></div>
            <div className="form-toggle-row"><span className="form-toggle-lbl">Competition Team Class</span><button className={`form-toggle${editCls.item.compTeam?' on':' off'}`} onClick={()=>setClsF('compTeam',!editCls.item.compTeam)}/></div>
            {editCls.item.compTeam&&<div className="form-group"><label className="form-label">Comp Tagline</label><input className="form-input" value={editCls.item.compTagline||''} onChange={e=>setClsF('compTagline',e.target.value)}/></div>}
            <div className="form-btns">
              {!editCls.isNew&&<button className="form-del" onClick={delCls}>Delete</button>}
              <button className="form-cancel" onClick={()=>setEditCls(null)}>Cancel</button>
              <button className="form-save" onClick={saveCls}>Save</button>
            </div>
          </div>
        </div>
      )}

    </div>
  )
}
